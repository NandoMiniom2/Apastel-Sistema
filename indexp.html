<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL DO CIDADÃO | REPÚBLICA DE APASTEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono&display=swap');
        
        :root {
            --bg: #050505;
            --card-bg: #0a0a0a;
            --border: #222;
            --accent: #d0d0d0; /* Cor Neutra/Branca para o Público */
            --text: #aaa;
            --success: #0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        nav { width: 300px; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 10px; background: #080808; }
        .logo-box { margin-bottom: 30px; text-align: center; }
        .logo-box h2 { font-family: 'Share Tech Mono'; color: #fff; letter-spacing: 2px; }
        
        .nav-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 12px; cursor: pointer; text-align: left; font-family: 'Share Tech Mono'; transition: 0.2s; }
        .nav-btn:hover { border-color: var(--accent); color: #fff; background: rgba(255,255,255,0.02); }
        .nav-btn.active { border-color: var(--accent); color: #fff; background: #111; }

        /* Main Content */
        main { flex: 1; padding: 50px; overflow-y: auto; }
        .content-section { max-width: 700px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; position: relative; }
        .card h1 { font-family: 'Share Tech Mono'; color: #fff; margin-bottom: 20px; font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* Form Estilo SIGD */
        label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; color: var(--accent); }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; width: 100%; margin-bottom: 20px; font-family: inherit; font-size: 14px; }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-action { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 15px; width: 100%; cursor: pointer; font-family: 'Share Tech Mono'; font-size: 16px; text-transform: uppercase; transition: 0.3s; }
        .btn-action:hover { background: var(--accent); color: #000; font-weight: bold; }

        /* Scanner */
        #scanner-box { display: none; margin-top: 20px; text-align: center; }
        .scan-line { height: 2px; background: var(--success); width: 100%; position: relative; animation: scanAnim 1.5s infinite; box-shadow: 0 0 10px var(--success); }
        @keyframes scanAnim { 0% { top: 0; } 50% { top: 50px; } 100% { top: 0; } }

        /* Resultado e Botão Copiar */
        #resultado-alistamento { display: none; margin-top: 20px; background: #000; border: 1px dotted #444; padding: 20px; font-size: 12px; white-space: pre-wrap; color: var(--success); font-family: 'Share Tech Mono'; }
        .copy-btn { display: none; margin-top: 10px; border-color: var(--success); color: var(--success); }
        .copy-btn:hover { background: var(--success); color: #000; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">
            <h2>APASTEL GOV</h2>
            <p style="font-size: 10px; color: #555;">PORTAL DE IDENTIFICAÇÃO</p>
        </div>
        <button class="nav-btn active">ALISTAMENTO FaC</button>
        <button class="nav-btn">ASTROMOTIVE CORP</button>
        <button class="nav-btn">LEIS NACIONAIS</button>
        <div style="margin-top: auto; font-size: 9px; color: #333;">SISTEMA OPERANDO EM INTEL CELERON 657<br>6GB RAM | SEM GPU</div>
    </nav>

    <main>
        <section class="content-section">
            <div class="card">
                <h1>CENTRO DE RECRUTAMENTO</h1>
                <p style="margin-bottom: 25px; font-size: 13px;">Preencha os dados abaixo com precisão. O Tetrarcado analisará sua aptidão para as Forças de Apastel (FaC).</p>
                
                <form id="form-alistamento">
                    <label>Nome Completo do Operador</label>
                    <input type="text" id="nome" placeholder="Ex: NanVoid da Silva" required>

                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 1;">
                            <label>Idade Atual</label>
                            <input type="number" id="idade" placeholder="00" required>
                        </div>
                        <div style="flex: 2;">
                            <label>Setor de Interesse</label>
                            <select id="setor">
                                <option value="LOGÍSTICA URBANA (Astromotive)">LOGÍSTICA URBANA (Astromotive)</option>
                                <option value="MANUTENÇÃO DE ELÉTRICOS">MANUTENÇÃO DE ELÉTRICOS</option>
                                <option value="INFANTARIA DE FRONTEIRA">INFANTARIA DE FRONTEIRA</option>
                                <option value="AUXILIAR DE COMANDO M">AUXILIAR DE COMANDO M</option>
                            </select>
                        </div>
                    </div>

                    <button type="button" class="btn-action" onclick="iniciarEscaneamento()">ESCANEAR E PROCESSAR</button>
                </form>

                <div id="scanner-box">
                    <div class="scan-line"></div>
                    <p style="margin-top: 10px; color: var(--success); font-size: 12px;">CRUZANDO DADOS COM O BANCO CENTRAL...</p>
                </div>

                <div id="resultado-alistamento"></div>
                
                <button id="btn-copiar" class="btn-action copy-btn" onclick="copiarParaDiscord()">COPIAR PARA O DISCORD</button>
            </div>
        </section>
    </main>

    <script>
        let dadosFormatados = "";

        function iniciarEscaneamento() {
            const nome = document.getElementById('nome').value;
            const idade = document.getElementById('idade').value;
            const setor = document.getElementById('setor').value;

            if (!nome || !idade) {
                alert("ERRO: Preencha todos os campos antes do escaneamento.");
                return;
            }

            // Mostra o scanner
            document.getElementById('scanner-box').style.display = 'block';
            document.getElementById('form-alistamento').style.opacity = '0.3';
            document.getElementById('form-alistamento').style.pointerEvents = 'none';

            // Simula o tempo de processamento
            setTimeout(() => {
                document.getElementById('scanner-box').style.display = 'none';
                finalizarAlistamento(nome, idade, setor);
            }, 3000);
        }

        function finalizarAlistamento(nome, idade, setor) {
            const idSerie = Math.random().toString(36).substr(2, 9).toUpperCase() + "-" + new Date().getFullYear();
            const data = new Date().toLocaleDateString('pt-BR');

            // Formatação para visualização no site
            const previewText = `> STATUS: PROCESSADO COM SUCESSO\n> ID DE SÉRIE: ${idSerie}\n> NOME: ${nome}\n> IDADE: ${idade}\n> SETOR: ${setor}\n> PATENTE: CLASS-Z (CANDIDATO)`;
            
            // Formatação especial para o Discord (com Negritos e Blocos)
            dadosFormatados = ">>> **[ 📄 ] REGISTRO DE ALISTAMENTO | FaC**\n";
            dadosFormatados += "**----------------------------------**\n";
            dadosFormatados += `**NOME:** ${nome}\n`;
            dadosFormatados += `**IDADE:** ${idade} anos\n`;
            dadosFormatados += `**SETOR:** ${setor}\n`;
            dadosFormatados += `**ID SÉRIE:** \`${idSerie}\` \n`;
            dadosFormatados += `**DATA:** ${data}\n`;
            dadosFormatados += "**----------------------------------**\n";
            dadosFormatados += "**STATUS:** `[ APROVADO PARA ANÁLISE ]`\n";
            dadosFormatados += "*Apresente este código no canal de recrutamento.*";

            const resBox = document.getElementById('resultado-alistamento');
            resBox.innerText = previewText;
            resBox.style.display = 'block';

            document.getElementById('btn-copiar').style.display = 'block';
        }

        function copiarParaDiscord() {
            navigator.clipboard.writeText(dadosFormatados).then(() => {
                const btn = document.getElementById('btn-copiar');
                btn.innerText = "COPIADO! COLE NO DISCORD";
                btn.style.borderColor = "#fff";
                btn.style.color = "#fff";
                
                setTimeout(() => {
                    btn.innerText = "COPIAR PARA O DISCORD";
                    btn.style.borderColor = "var(--success)";
                    btn.style.color = "var(--success)";
                }, 3000);
            });
        }
    </script>
</body>
</html>
